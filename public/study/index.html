<!doctype html>
<html lang="en" data-theme="light" data-spacing="normal">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Bar Rules</title>
  <meta name="description" content="California bar essay rule drilling">
  <meta name="theme-color" content="#4338ca">
  <meta name="robots" content="noindex">
  <link rel="manifest" href="/study/manifest.webmanifest">
  <link rel="icon" href="/study/icon-192.png">
  <link rel="apple-touch-icon" href="/study/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Bar Rules">
  <link rel="stylesheet" href="/study/css/styles.css">
  <script>
    // Paint the right theme / text scale / spacing before first render (no flash).
    (function () {
      try {
        var d = document.documentElement;
        var s = localStorage.getItem('barrules.theme-hint');
        d.dataset.theme = s || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        var a = JSON.parse(localStorage.getItem('barrules.appearance-hint') || '{}');
        if (a.txt) d.style.setProperty('--txt', a.txt);
        if (a.spacing) d.dataset.spacing = a.spacing;
        if (a.bionic) d.dataset.bionic = '';
      } catch (e) { /* defaults stand */ }
    })();
  </script>
</head>
<body>
  <header id="appbar" class="appbar"></header>
  <main id="view" class="view">
    <div class="boot-splash">
      <div class="boot-glyph">§</div>
    </div>
  </main>
  <script type="module" src="/study/js/main.js"></script>
  <noscript>Bar Rules needs JavaScript.</noscript>
</body>
</html>
